{% extends 'base/base.html' %}
{% block title %}Cancel Booking{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:500px">
    <div class="card p-4 text-center">
        <i class="fas fa-times-circle text-danger fa-3x mb-3"></i>
        <h4 class="fw-bold">Cancel Booking?</h4>
        <p class="text-muted">Cancel your booking for <strong>{{ booking.property.title }}</strong>?</p>
        <form method="post" class="d-flex gap-3 justify-content-center mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Yes, Cancel</button>
            <a href="{% url 'booking_detail' booking.pk %}" class="btn btn-outline-secondary px-4">Keep Booking</a>
        </form>
    </div>
</div>
{% endblock %}
